<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mobiliteit — hero</title>
<style>
  @font-face {
    font-family: 'Manrope';
    src: url('fonts/Manrope-Medium.ttf') format('truetype');
    font-weight: 500;
  }
  html, body { margin:0; padding:0; width:100%; background:#F7F6F4; font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; }
  * { box-sizing: border-box; }

  .mob-wrap {
    width: 100%;
    padding: clamp(16px, 3vw, 48px);
    display: flex;
    justify-content: center;
  }

  .mob-hero {
    position: relative;
    width: 100%;
    max-width: 1400px;
    height: clamp(340px, 46vw, 680px);
    border-radius: clamp(16px, 2.2vw, 32px);
    overflow: hidden;
    background: linear-gradient(120deg, #1B1E3A 0%, #33396E 30%, #5669FF 58%, #7A3FB0 78%, #E5007E 100%);
    background-size: 260% 260%;
    animation: mobGradient 18s ease-in-out infinite alternate;
    box-shadow: 0 30px 70px -20px rgba(20, 22, 30, 0.35);
  }

  @keyframes mobGradient {
    0%   { background-position: 12% 30%; }
    100% { background-position: 88% 70%; }
  }

  .mob-phones {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3.5%;
  }

  .mob-phone {
    position: relative;
    height: 78%;
    aspect-ratio: 393 / 836;
    filter: drop-shadow(0 22px 34px rgba(10, 8, 30, 0.40));
  }

  .mob-phone img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .mob-plain { z-index: 1; }

  .mob-shot {
    z-index: 2;
    opacity: 0;
    transition: opacity 350ms ease;
  }
  .mob-shot.is-active { opacity: 1; }

  @media (max-width: 760px) {
    .mob-hero { height: clamp(300px, 60vw, 480px); }
    .mob-phones { gap: 2.4%; }
  }
  @media (max-width: 480px) {
    .mob-hero { height: clamp(260px, 78vw, 380px); }
    .mob-phone { height: 88%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .mob-hero { animation: none; }
    .mob-shot { transition: opacity 300ms ease; }
  }
</style>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="14" fill="#5669FF"/>
    <rect x="18" y="18" width="26" height="56" rx="6" fill="#ffffff" opacity="0.92"/>
    <rect x="52" y="18" width="26" height="56" rx="6" fill="#ffffff" opacity="0.7"/>
  </svg>
</template>
</head>
<body>

  <div class="mob-wrap">
    <div class="mob-hero">
      <div class="mob-phones">

        <div class="mob-phone">
          <img class="mob-plain" src="images/device-bezel.png" alt="">
          <img class="mob-shot" data-group="0" src="images/screen-01-trip.png" alt="">
          <img class="mob-shot" data-group="1" src="images/screen-05-plan.png" alt="">
          <img class="mob-shot" data-group="2" src="images/screen-09-options.png" alt="">
          <img class="mob-shot" data-group="3" src="images/screen-13-editprofile.png" alt="">
        </div>

        <div class="mob-phone">
          <img class="mob-plain" src="images/device-bezel.png" alt="">
          <img class="mob-shot" data-group="0" src="images/screen-02-ontime.png" alt="">
          <img class="mob-shot" data-group="1" src="images/screen-06-search.png" alt="">
          <img class="mob-shot" data-group="2" src="images/screen-10-departure.png" alt="">
          <img class="mob-shot" data-group="3" src="images/screen-14-steps.png" alt="">
        </div>

        <div class="mob-phone">
          <img class="mob-plain" src="images/device-bezel.png" alt="">
          <img class="mob-shot" data-group="0" src="images/screen-03-findway.png" alt="">
          <img class="mob-shot" data-group="1" src="images/screen-07-location.png" alt="">
          <img class="mob-shot" data-group="2" src="images/screen-11-account.png" alt="">
          <img class="mob-shot" data-group="3" src="images/screen-15-saved.png" alt="">
        </div>

        <div class="mob-phone">
          <img class="mob-plain" src="images/device-bezel.png" alt="">
          <img class="mob-shot" data-group="0" src="images/screen-04-delays.png" alt="">
          <img class="mob-shot" data-group="1" src="images/screen-08-filters.png" alt="">
          <img class="mob-shot" data-group="2" src="images/screen-12-departures.png" alt="">
          <img class="mob-shot" data-group="3" src="images/screen-01-trip.png" alt="">
        </div>

      </div>
    </div>
  </div>

<script>
  const GROUPS = 4;
  const SHOW_MS = 2600;
  const BLANK_MS = 350;

  function setGroup(g, active) {
    document.querySelectorAll('.mob-shot[data-group="' + g + '"]').forEach(el => {
      el.classList.toggle('is-active', active);
    });
  }

  let current = 0;
  function tick() {
    setGroup(current, true);
    setTimeout(() => {
      setGroup(current, false);
      current = (current + 1) % GROUPS;
      setTimeout(tick, BLANK_MS);
    }, SHOW_MS);
  }
  tick();
</script>
</body>
</html>
